[package]
name = "agent-sdk"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "A generic multi-agent SDK with ReAct loop, task management, and LLM integration"

[[bin]]
name = "agent"
path = "src/bin/agent.rs"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Date/time and IDs
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }

# Error handling
thiserror = "2"
anyhow = "1"

# HTTP client (for LLM providers)
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# File locking
fs2 = "0.4"

# File patterns
glob = "0.3"

# Graph algorithms (task dependencies)
petgraph = "0.6"

# CLI
clap = { version = "4", features = ["derive"] }
console = "0.15"
dotenvy = "0.15"

[dev-dependencies]
tempfile = "3"
